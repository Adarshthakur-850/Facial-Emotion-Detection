name: Pylint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pylint

      - name: Run Pylint
        run: |
          FILES=$(git ls-files '*.py')
          if [ -n "$FILES" ]; then
            pylint \
              --disable=missing-module-docstring,missing-function-docstring,line-too-long,trailing-whitespace,invalid-name,too-many-locals,too-many-statements,too-many-arguments,wrong-import-order,broad-exception-caught,unused-import \
              --max-line-length=120 \
              $FILES || true
          else
            echo "No Python files found."
          fi
